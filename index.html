<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Focus</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <p class="label">Daily Focus</p>
        <h1>每日专注计划</h1>
        <p>设置一个 25 分钟专注时段，写下今天最重要的三件事，然后开始。</p>
      </section>

      <section class="workspace">
        <article class="timer-card">
          <h2>专注计时器</h2>
          <div id="timer" class="timer" aria-live="polite">25:00</div>
          <div class="controls">
            <button id="start-btn" type="button">开始</button>
            <button id="pause-btn" type="button" class="secondary">暂停</button>
            <button id="reset-btn" type="button" class="secondary">重置</button>
          </div>
        </article>

        <article class="todo-card">
          <div class="card-heading">
            <h2>今日三件事</h2>
            <span id="progress">0/3</span>
          </div>
          <form id="todo-form" class="todo-form">
            <input id="todo-input" type="text" placeholder="输入一个任务" maxlength="32" required>
            <button type="submit">添加</button>
          </form>
          <ul id="todo-list" class="todo-list"></ul>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
